<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Intake Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="calculator-card">
            <h1 class="text-center mb-4">💧 Water Intake Calculator</h1>
            
            <div class="form-section">
                <div class="mb-4">
                    <label for="weight" class="form-label">Weight (kg)</label>
                    <input type="number" class="form-control" id="weight" placeholder="Enter your weight" min="1" max="500">
                    <div class="invalid-feedback" id="weightError">Please enter a valid weight (1-500 kg)</div>
                </div>

                <div class="mb-4">
                    <label for="activity" class="form-label">Activity Level</label>
                    <select class="form-select" id="activity">
                        <option value="sedentary">Sedentary</option>
                        <option value="lightly-active">Lightly Active</option>
                        <option value="moderately-active" selected>Moderately Active</option>
                        <option value="very-active">Very Active</option>
                    </select>
                </div>

                <div class="d-grid gap-2">
                    <button class="btn btn-primary btn-lg" id="calculateBtn">Calculate Water Intake</button>
                    <button class="btn btn-outline-secondary" id="resetBtn">Reset</button>
                </div>
            </div>

            <div class="result-section" id="resultSection" style="display: none;">
                <h3 class="text-center mb-4">Today's Goal</h3>
                
                <div class="result-item">
                    <span class="result-icon">💧</span>
                    <span class="result-value" id="resultMl">0 mL</span>
                </div>
                
                <div class="result-item">
                    <span class="result-icon">💧</span>
                    <span class="result-value" id="resultLiters">0 L</span>
                </div>
                
                <div class="result-item">
                    <span class="result-icon">🥛</span>
                    <span class="result-value" id="resultGlasses">0 Glasses (250 mL each)</span>
                </div>

                <div class="hydration-tip">
                    <span class="tip-icon">💡</span>
                    <span class="tip-text" id="hydrationTip">Stay hydrated throughout the day!</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
